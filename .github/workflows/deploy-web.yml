name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'eventbridgeapp/**'
  workflow_dispatch:  # Allow manual triggers

env:
  PROJECT_ID: eventbridge-483019
  REGION: us-central1
  SERVICE_NAME: eventbridge-api
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: us-central1-docker.pkg.dev/eventbridge-483019/eventbridge-repo/eventbridge-api

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation (optional if using key)

    defaults:
      run:
        working-directory: eventbridgeapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --build-arg NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            --build-arg NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}" \
            --cache-from ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="\
              DATABASE_URL=${{ secrets.DATABASE_URL }},\
              NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }},\
              NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }},\
              NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }},\
              NODE_ENV=production,\
              S3_BUCKET=eventbridge-media-185107161336,\
              GCS_BUCKET=eventbridge-media-185107161336,\
              NEXT_PUBLIC_GCS_BUCKET=eventbridge-media-185107161336" \
            --project=${{ env.PROJECT_ID }}

      - name: Show deployed URL
        run: |
          echo "✅ Deployed successfully!"
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)"
