name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install Cocoapods
        run: |
          # Handle potential path length issues on macOS runner
          git config --global core.longpaths true
          # Ensure iOS config files matches the runner's environment
          flutter build ios --no-codesign --config-only
          # Clear cache and ensure a clean reinstall to fix persistent git tag errors
          pod cache clean --all
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod install --repo-update

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
